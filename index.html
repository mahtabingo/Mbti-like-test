    .photo::after{

      button,

    @keyframes opt-ripple {
      0%   { transform: scale(0); opacity: .55; }
      100% { transform: scale(3.5); opacity: 0; }
    }

      position: absolute;
      border-radius: 50%;

    .btn.share {

<script>


  const glow = document.getElementById("glow");
  window.addEventListener("pointermove", (e) => {
    if (!glow) return;
    glow.style.left = e.clientX + "px";
    glow.style.top  = e.clientY + "px";
  });



  const questions = [
    { text:"بعد از یک روز سنگین، بیشتر اینطوری شارژ می‌شی:",
      options:[
        { label:"با دیدن آدم‌ها، گپ زدن، بیرون رفتن یا کار گروهی", add:{E:1} },
        { label:"با خلوت، هدفون، تنهایی و محیط ساکت", add:{I:1} }
      ]},
    { text:"وقتی در مورد یک موضوع جدید هیجان‌زده‌ای:",
      options:[
        { label:"سریع با یکی درمیون می‌ذارم و با حرف زدن ایده‌هام شکل می‌گیره", add:{E:1} },
        { label:"اول تو ذهنم جمعش می‌کنم، بعد که کامل شد مطرح می‌کنم", add:{I:1} }
      ]},
    { text:"در یک جمع جدید معمولاً:",
      options:[
        { label:"خودم شروع‌کننده‌ی تعامل و آشنایی هستم", add:{E:1} },
        { label:"اول مشاهده می‌کنم و کم‌کم وارد می‌شم", add:{I:1} }
      ]},

    { text:" وقتی می‌خوای چیزی رو یاد بگیری، ترجیحت اینه که:",
      options:[
        { label:"از مثال واقعی، تمرین و جزئیات ملموس شروع کنم", add:{S:1} },
        { label:"اول ایده‌ی کلی و مدل ذهنی رو بفهمم، بعد جزئیات", add:{N:1} }
      ]},
    { text:"وقتی با داده/اطلاعات زیادی روبه‌رو می‌شی:",
      options:[
        { label:"با نظم دادن به جزئیات و قدم‌به‌قدم جلو رفتن پیش می‌رم", add:{S:1} },
        { label:"دنبال الگو، ارتباط‌ها و تصویر کلی می‌گردم", add:{N:1} }
      ]},
    { text:"کدوم تو حل مسئله بیشتر بهت حس «درست بودن» می‌ده؟",
      options:[
        { label:"راه‌حلی که عملی، قابل اجرا و قابل تست باشه", add:{S:1} },
        { label:"راه‌حلی که در عین سادگی، هوشمندانه باشه و پشتش یک ایده‌ی کلی قوی باشه", add:{N:1} }
      ]},

    { text:"وقتی بین دو تصمیم گیر می‌کنی، بیشتر این رو معیار می‌گیری:",
      options:[
        { label:"منطقی‌تره؟ دقیق‌تره؟ شواهد چی می‌گن؟", add:{T:1} },
        { label:"روی آدم‌ها چه اثری می‌ذاره؟ با ارزش‌هام سازگاره؟", add:{F:1} }
      ]},
    { text:"وقتی به یکی بازخورد می‌دی:",
      options:[
        { label:"مستقیم و شفاف می‌گم چی ایراد داره و چطور بهتر شه", add:{T:1} },
        { label:"طوری می‌گم که طرف له نشه و انگیزه‌اش حفظ بشه", add:{F:1} }
      ]},
    { text:"توی بحث، بیشتر به این سمت کشیده می‌شی:",
      options:[
        { label:"پیدا کردن علت دقیق و درست یا غلط بودن ادعا", add:{T:1} },
        { label:"فهمیدن نیت، نگرانی‌ها و رسیدن به توافق انسانی", add:{F:1} }
      ]},

    { text:"وقتی یک پروژه/درس جدید شروع می‌کنی:",

  const baseScores = { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 };
  let state = { i:0, scores:{...baseScores}, history:[] };
  const app = document.getElementById("app");


  function computeType(scores){
    const EI = scores.I > scores.E ? "I" : "E";
    const SN = scores.N > scores.S ? "N" : "S";
    const TF = scores.F > scores.T ? "F" : "T";
    const JP = scores.P > scores.J ? "P" : "J";
    return EI + SN + TF + JP;
  }
  function applyAdd(add, sign=+1){
    for (const [k,v] of Object.entries(add)){
      state.scores[k] = (state.scores[k] || 0) + sign * v;
    }
  }
  function pct(a, b){
    const total = a + b;
    if (!total) return 50;
    return Math.round((a / total) * 100);
  }
  function renderAxisCard(title, leftLabel, leftScore, rightLabel, rightScore){
    const leftPct = pct(leftScore, rightScore);
    return `
      <div class="axis">
        <h3>${title}</h3>
        <div class="row"><span>${leftLabel}</span><span>${leftPct}%</span></div>
        <div class="bar"><div style="width:${leftPct}%"></div></div>
        <div class="row" style="margin-top:8px;"><span>${rightLabel}</span><span>${100-leftPct}%</span></div>
      </div>
    `;
  }

  function fadeOut(cb) {
    app.classList.add("fade-out");
    setTimeout(() => {
      cb();
      app.classList.remove("fade-out");
    }, 190);
  }

            نتیجه قرار نیست حکم قطعی شخصیتت باشه. فقط یک آینه‌ی سرگرم‌کننده‌ست.

      </div>
    `;
  }

  window.start = function(){
    state = { i:0, scores:{...baseScores}, history:[] };
    fadeOut(renderQuestion);
  };

  function renderQuestion(){
    const q = questions[state.i];
    const progress = state.i + 1;

    app.innerHTML = `
      <div class="topbar">
        <div class="pills">
          <div class="pill alt">سؤال ${progress} از ${questions.length}</div>
        </div>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          ${state.i>0 ? `<button class="btn" onclick="back()">قبلی</button>` : ``}
          <button class="btn" onclick="exitToStart()">خروج</button>
        </div>
      </div>

      <div class="q">${q.text}</div>
      <div class="opts">
        ${q.options.map((o, idx)=>`
          <button class="opt" onclick="answer(${idx}, this)">${o.label}</button>
        `).join("")}
      </div>

      <div class="footer">
        <span class="small">گزینه واقعی رو انتخاب کن، نه اونی که به نظرت بهتره.</span>
      </div>
    `;
  }

  window.exitToStart = function(){
    fadeOut(renderStart);
  };

  window.answer = function(optionIndex, btn){
    const ripple = document.createElement("span");
    ripple.className = "ripple";
    const rect = btn.getBoundingClientRect();
    ripple.style.left = (rect.width / 2 - 30) + "px";
    ripple.style.top  = (rect.height / 2 - 30) + "px";
    btn.appendChild(ripple);

    btn.classList.add("selected");

    document.querySelectorAll(".opt").forEach(b => b.disabled = true);

    const q = questions[state.i];
    const opt = q.options[optionIndex];

    setTimeout(() => {
      applyAdd(opt.add, +1);
      state.history.push({ qIndex: state.i, add: opt.add, chosen: opt.label, qText: q.text });
      state.i++;

      if (state.i >= questions.length) {
        fadeOut(renderAnalyzing);
      } else {
        fadeOut(renderQuestion);
      }
    }, 420); 
  };

  function renderAnalyzing(){
    const messages = [
      "در حال تحلیل الگوهای شخصیتی...",
      "محاسبه‌ی محورهای شناختی...",
      "پیدا کردن شخصیت علمی شما..."
    ];
    let idx = 0;

    app.innerHTML = `
      <div class="analyzing-overlay">
        <div class="analyzing-dots">
          <span></span><span></span><span></span>
        </div>
        <div class="a-label" id="analyzing-msg">${messages[0]}</div>
      </div>
    `;

    const msgEl = document.getElementById("analyzing-msg");
    const interval = setInterval(() => {
      idx++;
      if (msgEl && idx < messages.length) msgEl.textContent = messages[idx];
    }, 700);

    setTimeout(() => {
      clearInterval(interval);
      fadeOut(renderResult);
    }, 2100);
  }

  window.back = function(){
    if (!state.history.length) return;
    const last = state.history.pop();
    applyAdd(last.add, -1);
    state.i = Math.max(0, state.i-1);
    fadeOut(renderQuestion); 
  };

    `;
  }
    
  window.shareResult = async function(){
    const btn = document.getElementById("share-btn");
    if (btn) { btn.disabled = true; btn.textContent = "در حال ساخت تصویر..."; }

    try {
      const canvas = await html2canvas(app, {
        backgroundColor: "#070A12",
        scale: 2,                 
        useCORS: true,
        allowTaint: true,
        logging: false,
        ignoreElements: (el) => el.classList.contains("actions")
      });

      const dataUrl = canvas.toDataURL("image/png");

      const backdrop = document.createElement("div");
      backdrop.className = "share-modal-backdrop";
      backdrop.innerHTML = `
        <div class="share-modal">
          <h3>پیش‌نمایش تصویر نتیجه</h3>
          <img src="${dataUrl}" alt="نتیجه تست" />
          <div class="share-modal-actions">
            <button class="btn primary" id="download-btn">دانلود تصویر</button>
            <button class="btn" onclick="this.closest('.share-modal-backdrop').remove()">بستن</button>
          </div>
        </div>
      `;

      backdrop.addEventListener("click", (e) => {
        if (e.target === backdrop) backdrop.remove();
      });

      document.body.appendChild(backdrop);

      document.getElementById("download-btn").addEventListener("click", () => {
        const a = document.createElement("a");
        a.href = dataUrl;
        a.download = "personality-result.png";
        a.click();
      });

      const shareApiBtn = document.createElement("button");
      shareApiBtn.className = "btn";
      shareApiBtn.textContent = "اشتراک‌گذاری مستقیم";

      if (navigator.share && navigator.canShare) {
        canvas.toBlob(async (blob) => {
          const file = new File([blob], "personality-result.png", { type: "image/png" });
          if (navigator.canShare({ files: [file] })) {
            shareApiBtn.addEventListener("click", async () => {
              try {
                await navigator.share({
                  title: "نتیجه تست شخصیتی",
                  text: "شبیه کدام دانشمند CS/Math هستی؟",
                  files: [file]
                });
              } catch(_) {}
            });
            backdrop.querySelector(".share-modal-actions").appendChild(shareApiBtn);
          }
        });
      }

    } catch(err) {
      console.error("share error", err);
      alert("خطا در ساخت تصویر. لطفاً دوباره امتحان کن.");
    } finally {
      if (btn) {
        btn.disabled = false;
        btn.innerHTML = `
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
          </svg>
          اشتراک‌گذاری`;
      }
    }
  };

  renderStart();
</script>
</body>
</html>
